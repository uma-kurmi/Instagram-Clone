<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
<div class="container">
    <h2>Search Users</h2>
    <form action="/search" method="post">
        <input type="text" name="search_query" placeholder="Search by username" required>
        <button type="submit">Search</button>
    </form>

    {% if search_results %}
        <h3>Results:</h3>
        {% for user in search_results %}
            <p><a href="/profile/{{ user }}">{{ user }}</a></p>
        {% endfor %}
    {% endif %}
    <a href="/">Back to Timeline</a>
</div>
</body>
</html>
